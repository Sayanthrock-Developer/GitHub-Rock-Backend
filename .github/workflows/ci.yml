name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_CLIENT_ID: Ov23lim8WhLjeUMqvuMj
      GITHUB_ROCK_BACKEND_URL: ""
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"
      - name: Validate repository files
        shell: bash
        run: |
          for script in scripts/*.sh; do
            bash -n "$script"
          done
          test -s .env.example
          [[ -f .env ]] || cp .env.example .env
          docker compose config --quiet
          test -s LICENSE
          test -s web/index.html
      - name: Build and test backend
        id: gradle-build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --console=plain clean test buildFatJar 2>&1 | tee gradle-build.log
      - name: Upload Gradle diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-build-log
          path: gradle-build.log
          if-no-files-found: error
          retention-days: 7
      - name: Upload server JAR
        if: steps.gradle-build.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: github-rock-backend
          path: build/libs/github-rock-backend.jar
          if-no-files-found: error
          retention-days: 14
      - name: Enforce backend Gradle result
        if: steps.gradle-build.outcome == 'failure'
        run: exit 1

      - name: Check out companion Android integration branch
        uses: actions/checkout@v7
        with:
          repository: Sayanthrock-Developer/GitHub-Rock
          ref: integration/backend-v1
          path: android-client
      - name: Switch to JDK 17 for Android
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Generate Android Gradle wrapper
        working-directory: android-client
        run: gradle wrapper --gradle-version 8.13
      - name: Android unit tests
        working-directory: android-client
        run: |
          set -o pipefail
          ./gradlew testDebugUnitTest --stacktrace 2>&1 | tee unit-tests.log
      - name: Compile Compose UI tests
        working-directory: android-client
        run: |
          set -o pipefail
          ./gradlew assembleDebugAndroidTest --stacktrace 2>&1 | tee ui-tests.log
      - name: Android lint
        working-directory: android-client
        run: ./gradlew lintDebug --stacktrace
      - name: Build debug APK
        working-directory: android-client
        run: ./gradlew assembleDebug --stacktrace
      - name: Verify release APK
        working-directory: android-client
        run: ./gradlew assembleRelease --stacktrace
      - name: Upload Android verification
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: github-rock-android-integration
          path: |
            android-client/app/build/outputs/apk/debug/*.apk
            android-client/app/build/reports/tests/
            android-client/app/build/reports/lint-results-debug.html
            android-client/unit-tests.log
            android-client/ui-tests.log
          if-no-files-found: warn
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Build container
        run: docker build -t github-rock-backend:ci .
