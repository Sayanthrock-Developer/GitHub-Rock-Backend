name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6"
      - name: Validate repository files
        shell: bash
        run: |
          bash -n scripts/*.sh
          cp .env.example .env
          docker compose config --quiet
          test -s LICENSE
          test -s web/index.html
      - name: Build and test
        id: gradle-build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --console=plain clean test buildFatJar 2>&1 | tee gradle-build.log
      - name: Upload Gradle diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-build-log
          path: gradle-build.log
          if-no-files-found: error
          retention-days: 7
      - name: Upload server JAR
        if: steps.gradle-build.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: github-rock-backend
          path: build/libs/github-rock-backend.jar
          if-no-files-found: error
          retention-days: 14
      - name: Enforce Gradle result
        if: steps.gradle-build.outcome == 'failure'
        run: exit 1

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Build container
        run: docker build -t github-rock-backend:ci .
