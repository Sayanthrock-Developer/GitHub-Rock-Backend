name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"
      - name: Build and test
        run: gradle --no-daemon clean test buildFatJar
      - name: Upload server JAR
        uses: actions/upload-artifact@v4
        with:
          name: github-rock-backend
          path: build/libs/github-rock-backend.jar
          if-no-files-found: error
          retention-days: 14

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build container
        run: docker build -t github-rock-backend:ci .
