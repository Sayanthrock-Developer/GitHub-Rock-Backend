services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: githubrock
      POSTGRES_USER: githubrock
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-githubrock-dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U githubrock -d githubrock"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend]

  meilisearch:
    image: getmeili/meilisearch:v1.14
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-githubrock-dev-key}
      MEILI_ENV: ${MEILI_ENV:-development}
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend]

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/githubrock
      DATABASE_USER: githubrock
      REDIS_URL: redis://redis:6379
      MEILI_URL: http://meilisearch:7700
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      CADDY_ADDRESS: ${CADDY_ADDRESS:-http://localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks: [backend]

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meili_data:
  caddy_data:
  caddy_config:
